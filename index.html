<script>
    const BATCH_URLS = {
        'batch1': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRbCq73MJLutPIdiSHMtsLgzvzE0QrPOJuHC2CPbb8B1H0Yi3Ewije4kqdwLEvR8Fc9X1mf0dqh4nAb/pub?gid=2111996398&single=true&output=csv',
        'batch2': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRbCq73MJLutPIdiSHMtsLgzvzE0QrPOJuHC2CPbb8B1H0Yi3Ewije4kqdwLEvR8Fc9X1mf0dqh4nAb/pub?gid=1002419209&single=true&output=csv',
        'batch3': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRbCq73MJLutPIdiSHMtsLgzvzE0QrPOJuHC2CPbb8B1H0Yi3Ewije4kqdwLEvR8Fc9X1mf0dqh4nAb/pub?gid=801337014&single=true&output=csv'
    };

    let participants = [];
    let selectedIndices = new Set();
    let currentBatch = 'batch1';
    let currentWS = 'All';
    let certImage = '';

    const schedule = {
        'batch1': ['All', 'Arduino', 'Mbot2'],
        'batch2': ['All', 'Arduino', 'Mbot2', '3d Printing'],
        'batch3': ['All', 'Arduino', 'Mbot2', '3d Printing', 'Drone Workshop']
    };

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('iTechTerminalV8'));
        if (saved) {
            Object.keys(saved).forEach(key => { if(document.getElementById(key)) document.getElementById(key).value = saved[key]; });
            certImage = saved.certImage || '';
            if(certImage) document.getElementById('uploadLabel').innerText = "✅ Template Ready";
        }
        filterBatch('batch1', document.querySelector('.batch-pill'));
        fetchLiveData();
    };

    function filterBatch(batch, btn) {
        currentBatch = batch;
        currentWS = 'All';
        selectedIndices.clear();
        document.querySelectorAll('.batch-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const container = document.getElementById('wsPillsContainer');
        container.innerHTML = schedule[batch].map(ws => 
            `<button class="ws-pill ${ws === 'All' ? 'active' : ''}" onclick="filterWS('${ws}', this)">${ws.toUpperCase()}</button>`
        ).join('');
        render();
    }

    function filterWS(ws, btn) {
        currentWS = ws;
        selectedIndices.clear();
        document.getElementById('selectAll').checked = false;
        document.querySelectorAll('.ws-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    async function fetchLiveData() {
        const targetUrl = BATCH_URLS[currentBatch];
        const btn = document.getElementById('syncBtn');
        if (!targetUrl) return;
        btn.innerText = "⌛ Syncing...";
        try {
            const response = await fetch(`${targetUrl}&t=${Date.now()}`);
            const csvData = await response.text();
            const rows = csvData.split(/\r?\n/).filter(r => r.trim() !== "");
            const dataRows = rows.slice(1);
            
            const newData = dataRows.map((row, index) => {
                // Regex to handle commas inside quotes correctly
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (cols && cols.length > 0) {
                    let fullName = cols[0].replace(/"/g, '').trim();

                    /* EMERGENCY LOGIC FOR BATCH 1: 
                       If it's Batch 1 AND column 2 is NOT a number (Age), 
                       join Col 1 and Col 2 together to fix the comma split. */
                    if (currentBatch === 'batch1' && cols[1] && isNaN(cols[1].trim())) {
                        fullName += " " + cols[1].replace(/"/g, '').trim();
                    }

                    return {
                        id: currentBatch + "_" + index,
                        name: fullName.toUpperCase(),
                        batch: currentBatch,
                        // If fullName was reconstructed, workshop might be shifted to cols[10] instead of cols[9]
                        workshop: (currentBatch === 'batch1' && isNaN(cols[1].trim()) ? (cols[10] || "Workshop") : (cols[9] || "Workshop")).replace(/"/g, '').trim()
                    };
                }
                return null;
            }).filter(p => p !== null && p.name !== "" && p.name !== "FULL NAME");

            participants = participants.filter(p => p.batch !== currentBatch).concat(newData);
            render();
            btn.innerText = "✅ Sync Done";
        } catch (err) { btn.innerText = "❌ Failed"; }
    }

    function toggleAll() {
        const q = document.getElementById('globalSearch').value.toUpperCase();
        const filtered = participants.filter(p => p.name.includes(q) && p.batch === currentBatch && (currentWS === 'All' || p.workshop === currentWS));
        
        if (document.getElementById('selectAll').checked) {
            filtered.forEach(p => selectedIndices.add(p.id));
        } else {
            filtered.forEach(p => selectedIndices.delete(p.id));
        }
        render();
    }

    function render() {
        const q = document.getElementById('globalSearch').value.toUpperCase();
        const container = document.getElementById('listContainer');
        const filtered = participants.filter(p => p.name.includes(q) && p.batch === currentBatch && (currentWS === 'All' || p.workshop === currentWS));

        container.innerHTML = filtered.map(p => `
            <div class="participant-card">
                <input type="checkbox" style="width:18px;height:18px;accent-color:var(--primary)" ${selectedIndices.has(p.id) ? 'checked' : ''} onclick="toggleSelection('${p.id}')">
                <div class="p-info">
                    <h4>${p.name}</h4>
                    <p>${p.workshop}</p>
                </div>
                <button class="btn-print-sm" onclick="printCert('${p.name.replace(/'/g, "\\'")}', '${p.workshop.replace(/'/g, "\\'")}')">🖨️</button>
            </div>
        `).join('');
        updateSelectionUI();
    }

    function toggleSelection(id) {
        selectedIndices.has(id) ? selectedIndices.delete(id) : selectedIndices.add(id);
        updateSelectionUI();
    }

    function updateSelectionUI() {
        document.getElementById('printSelectedBtn').innerText = `✅ Print (${selectedIndices.size})`;
    }

    function handleBgUpload(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                certImage = e.target.result;
                document.getElementById('uploadLabel').innerText = "✅ Template Ready";
                saveConfig();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveConfig() {
        const config = {
            nameTop: document.getElementById('nameTop').value,
            nameLeft: document.getElementById('nameLeft').value,
            nameSize: document.getElementById('nameSize').value,
            wsTop: document.getElementById('wsTop').value,
            wsLeft: document.getElementById('wsLeft').value,
            wsSize: document.getElementById('wsSize').value,
            certImage: certImage
        };
        localStorage.setItem('iTechTerminalV8', JSON.stringify(config));
    }

    function printCert(name, ws) { prepareBulk([{name, workshop: ws}]); setTimeout(() => window.print(), 100); }

    function printSelected() {
        const list = participants.filter(p => selectedIndices.has(p.id));
        if (!list.length) return alert("Select participants first.");
        prepareBulk(list);
        setTimeout(() => window.print(), 100);
    }

    function prepareBulk(list) {
        const c = JSON.parse(localStorage.getItem('iTechTerminalV8'));
        document.getElementById('bulk-container').innerHTML = list.map(p => `
            <div class="cert-page" style="background-image: url('${certImage}')">
                <div class="print-text" style="top:${c.nameTop}%; left:${c.nameLeft}%; font-size:${c.nameSize}px; font-weight:700; font-family:'Libre Baskerville', serif;">${p.name}</div>
                <div class="print-text" style="top:${c.wsTop}%; left:${c.wsLeft}%; font-size:${c.wsSize}px; font-weight:700;">${p.workshop.toUpperCase()} WORKSHOP</div>
            </div>
        `).join('');
    }
</script>
